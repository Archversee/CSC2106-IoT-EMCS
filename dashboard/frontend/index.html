<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MQTT Subscriber Dashboard (MVP)</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===== Base / Theme ===== */
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111827;
      --muted:#6b7280;
      --border:#eceef3;
      --accent:#7c3aed;
      --accent-600:#6d28d9;
      --shadow:0 6px 18px rgba(17,24,39,.06);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    /* ===== Header ===== */
    .dashboard-header{
      position:sticky; top:0; z-index:5;
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 28px;
      background:var(--card);
      border-bottom:1px solid var(--border);
    }
    .dashboard-header h1{margin:0; font-size:22px; font-weight:800; letter-spacing:.1px}
    .btn{
      appearance:none; border:0; cursor:pointer; font:600 14px/1 'Poppins',sans-serif;
      padding:10px 14px; border-radius:12px; transition:filter .15s ease, transform .15s ease;
    }
    .btn:disabled{opacity:.6; cursor:not-allowed}
    .btn:hover{filter:brightness(1.02)}
    .btn-secondary{background:#f3f4f6; color:#111827; border:1px solid var(--border)}
    .header-actions{display:flex; gap:10px}

    /* ===== Layout ===== */
    .container{
      max-width:1200px; margin:0 auto; padding:22px;
      display:grid; grid-template-columns: 320px 1fr; gap:22px;
    }
    @media (max-width: 980px){
      .container{grid-template-columns:1fr; gap:18px; padding:16px}
    }

    /* ===== Cards ===== */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .card h2{margin:0 0 12px; font-size:16px; font-weight:700}

    /* ===== Devices ===== */
    .devices-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px}
    .devices-list li{
      background:#f8fafc; border:1px solid var(--border);
      padding:12px 14px; border-radius:12px; cursor:pointer;
      display:flex; flex-direction:column; gap:4px;
      transition:transform .12s ease, background .12s ease;
    }
    .devices-list li:hover{transform:translateX(3px)}
    .devices-list li strong{font-weight:700}
    .muted{color:var(--muted); font-size:12px}

    /* ===== Send Command (single-field) ===== */
    #send-card .form{display:grid; gap:12px}
    #send-card label{font-weight:700; font-size:13px}
    #payload{
      width:100%; min-height:64px; resize:vertical;
      padding:10px 12px; border-radius:12px; border:1px solid var(--border);
      background:#f8fafc; outline:none;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
      font-family:inherit; font-size:14px;
    }
    #payload:focus{
      background:#fff; border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,.15);
    }
    .hint{color:var(--muted); font-size:12.5px}

    .actions{display:flex; justify-content:flex-end}
    .btn-primary{
      background:var(--accent); color:#fff; border-radius:12px; padding:10px 16px;
    }
    .btn-primary:hover{transform:translateY(-1px); background:var(--accent-600)}

    /* ===== Recent Messages ===== */
    .recent-item{
      padding:12px 14px; border:1px solid var(--border); border-radius:12px;
      background:#fff; margin-bottom:10px; font-size:12.5px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* Toast used by client.js */
    .toast{
      position:fixed; right:20px; bottom:20px; background:#111827; color:#fff;
      padding:12px 14px; border-radius:12px; z-index:1000; box-shadow:var(--shadow);
    }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <h1>MQTT Subscriber Dashboard (MVP)</h1>
    <div class="header-actions">
      <button id="refresh-devices" class="btn btn-secondary">Refresh Devices</button>
    </div>
  </div>

  <div class="container">
    <!-- Left: Devices + Command -->
    <aside class="sidebar">
      <section class="card">
        <h2>Devices</h2>
        <ul class="devices-list" id="devices-ul"></ul>
      </section>

      <!-- Send Command -->
      <section id="send-card" class="card">
        <h2>Send Command</h2>
        <div class="form">
          <div class="field">
            <label for="payload">Command</label>
            <textarea id="payload" placeholder='Type a command (e.g., "led on")'></textarea>
            <p class="hint">Publishes to <code>pico/cmd</code> as a plain string.</p>
          </div>
          <div class="actions">
            <button id="send-btn" class="btn btn-primary" type="button">Send Command</button>
          </div>
        </div>
      </section>
    </aside>

    <!-- Right: Recent Messages only (graph removed) -->
    <main class="main-content" style="display:flex; flex-direction:column; gap:22px;">
      <section class="card">
        <h2>Recent Messages</h2>
        <div id="recent-messages"></div>
      </section>
    </main>
  </div>

  <!-- Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- App client -->
  <script src="client.js"></script>
</body>
</html>
