<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MQTT Subscriber Dashboard (MVP)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    :root { --panel:#f3f3f3; --muted:#7a7a7a; --accent:#0b5cff; }
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Helvetica Neue",Arial;background:#fff;color:#111;}
    .container{display:flex;gap:36px;padding:28px;align-items:flex-start}
    .left{width:360px;background:var(--panel);border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
    h1{font-size:40px;margin:0 0 18px 0;font-weight:800}
    h2{font-size:22px;margin:10px 0}
    .devices-list{margin:10px 0;padding-left:20px}
    .devices-list li{margin:8px 0;cursor:pointer}
    .muted{color:var(--muted);font-size:14px}
    .form-control{width:100%;padding:10px;border-radius:6px;border:1px solid #ddd;margin-bottom:12px;box-sizing:border-box}
    #send-btn{padding:10px 14px;border-radius:6px;border:2px solid #222;background:white;cursor:pointer}
    .right{flex:1}
    .chart-wrap{width:100%;height:300px;background:transparent}
    .recent-messages{margin-top:20px}
    .recent-item{padding:18px;background:#111;color:#fff;border-radius:6px;margin-bottom:12px;white-space:pre-wrap}
    .toast{position:fixed;right:20px;bottom:20px;padding:8px 12px;border-radius:6px;color:#fff;z-index:2000}
  </style>
</head>
<body>
  <h1 style="padding-left:28px">MQTT Subscriber Dashboard (MVP)</h1>
  <div class="container">
    <div class="left">
      <h2>Devices</h2>
      <button id="refresh-devices" style="padding:8px 12px;border-radius:6px;margin-bottom:8px">Refresh</button>
      <ul class="devices-list" id="devices-ul"></ul>

      <h2>Publish command</h2>
      <input id="device-id" class="form-control" placeholder="device id (e.g. pico-001)" />
      <input id="topic-suffix" class="form-control" placeholder="topic suffix (e.g. cmd/restart or cmd)" />
      <textarea id="payload" class="form-control" rows="6" placeholder='{}'>{}</textarea>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="send-btn">Send</button>
        <label style="margin-left:8px;color:var(--muted)"><input id="qos1" type="checkbox" /> QoS1</label>
      </div>
    </div>

    <div class="right">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2>Select a device</h2>
        <div style="color:var(--muted)">Live telemetry</div>
      </div>
      <div class="chart-wrap">
        <canvas id="telemetry-chart"></canvas>
      </div>

      <div class="recent-messages">
        <h2>Recent messages</h2>
        <div id="recent-messages"></div>
      </div>
    </div>
  </div>

  <!-- Socket.io client served by server -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- App client -->
  <script src="client.js"></script>
</body>
</html>
