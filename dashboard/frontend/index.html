<!DOCTYPE html>
<html>

<head>

    <title>CSC2106 IoT Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        .panel {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>

</head>

<body>

    <h1>CSC2106 IoT Dashboard</h1>

    <h2>Devices</h2>

    <p id="picoStatus">Pico : Offline</p>
    <p id="arduinoStatus">Arduino : Offline</p>

    <hr>

    <button onclick="sendCmd('led on')">LED ON</button>
    <button onclick="sendCmd('led off')">LED OFF</button>

    <hr>

    <h2>Sensor Graph</h2>
    <canvas id="sensorChart"></canvas>

    <hr>

    <h2>Pico Data</h2>
    <ul id="pico" class="panel"></ul>

    <h2>Arduino Data</h2>
    <ul id="arduino" class="panel"></ul>

    <h2>Commands</h2>
    <ul id="cmd" class="panel"></ul>

    <script>

        const socket = io();

        const ctx = document.getElementById("sensorChart");

        const chart = new Chart(ctx, {

            type: "line",

            data: {
                labels: [],
                datasets: [{
                    label: "Sensor Data",
                    data: [],
                    borderColor: "blue",
                    fill: false
                }]
            },

            options: {
                animation: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }

        });

        socket.on("mqtt_message", (data) => {

            const li = document.createElement("li");
            const time = new Date().toLocaleTimeString();

            li.innerText = `[${time}] ${data.topic} : ${data.message}`;

            let list;

            if (data.topic.includes("pico")) {
                list = document.getElementById("pico");
                document.getElementById("picoStatus").innerText = "Pico : Online";
            }
            else if (data.topic.includes("arduino")) {
                list = document.getElementById("arduino");
                document.getElementById("arduinoStatus").innerText = "Arduino : Online";
            }
            else {
                list = document.getElementById("cmd");
            }

            list.prepend(li);

            // graph update
            if (data.topic === "sensors/data") {

                const parts = data.message.split(" ");

                if (parts.length > 1) {

                    const value = parseInt(parts[1]);

                    chart.data.labels.push(new Date().toLocaleTimeString());
                    chart.data.datasets[0].data.push(value);

                    if (chart.data.labels.length > 20) {
                        chart.data.labels.shift();
                        chart.data.datasets[0].data.shift();
                    }

                    chart.update();

                }

            }

        });

        function sendCmd(msg) {
            fetch(`/cmd/${msg}`);
        }

    </script>

</body>

</html>
